name: Render 3D Character

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  BLENDER_VERSION: "3.6.21"
  SCRIPT_PATH: "scripts/render_character.py"
  REF_IMAGE: "assets/reference.png"

jobs:
  render:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify inputs
        shell: bash
        run: |
          set -e

          echo "PWD:"
          pwd
          echo ""

          echo "Repo root:"
          ls -lah
          echo ""

          echo "assets:"
          ls -lah assets || true
          echo ""

          echo "scripts:"
          ls -lah scripts || true
          echo ""

          echo "Expected script: ${{ env.SCRIPT_PATH }}"
          echo "Expected ref:    ${{ env.REF_IMAGE }}"
          echo ""

          [ -f "${{ env.SCRIPT_PATH }}" ] || { echo "Missing script file"; exit 1; }
          [ -f "${{ env.REF_IMAGE }}" ] || { echo "Missing reference image"; exit 1; }

          echo "All required inputs found."

      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ env.BLENDER_VERSION }}-ubuntu22-render-v4

      - name: Download Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -e
          wget -q \
            "https://download.blender.org/release/Blender3.6/blender-${{ env.BLENDER_VERSION }}-linux-x64.tar.xz" \
            -O /tmp/blender.tar.xz
          mkdir -p ~/blender
          tar -xf /tmp/blender.tar.xz -C ~/blender --strip-components=1
          rm -f /tmp/blender.tar.xz

      - name: Set Blender path
        shell: bash
        run: |
          set -e
          ~/blender/blender --version
          echo "BLENDER_PATH=$HOME/blender/blender" >> "$GITHUB_ENV"

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libxi6 \
            libxxf86vm1 \
            libxfixes3 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libsm6 \
            libice6 \
            libxrandr2 \
            libxcursor1 \
            libxinerama1 \
            libgl1 \
            libgl1-mesa-dri \
            libglx-mesa0 \
            libegl1 \
            libegl-mesa0 \
            libglib2.0-0 \
            libgomp1 \
            libosmesa6 \
            mesa-utils \
            libglu1-mesa

      - name: Prepare output
        shell: bash
        run: mkdir -p output

      - name: Test Blender
        shell: bash
        run: |
          set -o pipefail
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=3.3 \
          MESA_GLSL_VERSION_OVERRIDE=330 \
          "$BLENDER_PATH" \
            --background \
            --factory-startup \
            -noaudio \
            --python-exit-code 1 \
            --python-expr "import bpy; print('BLENDER_OK=' + bpy.app.version_string)" \
            2>&1 | tee /tmp/blender_test.log

          grep -q "BLENDER_OK" /tmp/blender_test.log

      - name: Run render pipeline
        shell: bash
        run: |
          set -o pipefail
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=3.3 \
          MESA_GLSL_VERSION_OVERRIDE=330 \
          LP_NUM_THREADS=4 \
          "$BLENDER_PATH" \
            --background \
            --factory-startup \
            -noaudio \
            --python-exit-code 1 \
            --python "${{ env.SCRIPT_PATH }}" \
            -- \
            --output-dir "${{ github.workspace }}/output" \
            --reference-image "${{ github.workspace }}/${{ env.REF_IMAGE }}" \
            2>&1 | tee /tmp/blender_output.log

      - name: Show render log tail
        if: always()
        shell: bash
        run: |
          echo "=== Last 200 lines of blender output ==="
          tail -n 200 /tmp/blender_output.log || true

      - name: Verify outputs
        shell: bash
        run: |
          set -e
          ls -lah output/ || true

          [ -f "output/character_render.png" ] && echo "PNG OK" || (echo "PNG missing" && exit 1)
          [ -f "output/character_scene.blend" ] && echo "BLEND OK" || echo "BLEND missing"
          [ -f "output/character_scene.glb" ] && echo "GLB OK" || echo "GLB missing"

      - name: Upload render
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-png
          path: output/character_render.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload blend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scene-blend
          path: output/character_scene.blend
          if-no-files-found: warn
          retention-days: 30

      - name: Upload glb
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scene-glb
          path: output/character_scene.glb
          if-no-files-found: warn
          retention-days: 30

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender-debug-log
          path: /tmp/blender_output.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender-test-log
          path: /tmp/blender_test.log
          if-no-files-found: warn
          retention-days: 7

      - name: Job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Render Results"
            echo ""
            echo "| File | Status |"
            echo "|------|--------|"
            for f in \
              "PNG:output/character_render.png" \
              "BLEND:output/character_scene.blend" \
              "GLB:output/character_scene.glb"; do
              LABEL=$(echo "$f" | cut -d: -f1)
              FILE=$(echo "$f" | cut -d: -f2)
              [ -f "$FILE" ] && STATUS="✅ Ready" || STATUS="❌ Missing"
              echo "| $LABEL | $STATUS |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
