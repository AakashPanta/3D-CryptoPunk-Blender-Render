name: 3D CryptoPunk Character Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BLENDER_VERSION: "4.1.1"
  BLENDER_MAJOR: "4.1"
  SCRIPT_PATH: "scripts/cryptopunk_3d.py"

jobs:
  render:
    name: Build and Render 3D Character
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ env.BLENDER_VERSION }}-ubuntu22-v7

      - name: Download and Install Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Blender ${{ env.BLENDER_VERSION }}..."
          BLENDER_TAR="blender-${{ env.BLENDER_VERSION }}-linux-x64.tar.xz"
          BLENDER_URL="https://download.blender.org/release/Blender${{ env.BLENDER_MAJOR }}/${BLENDER_TAR}"
          mkdir -p ~/blender
          wget -q "${BLENDER_URL}" -O /tmp/blender.tar.xz
          tar -xf /tmp/blender.tar.xz -C ~/blender --strip-components=1
          rm /tmp/blender.tar.xz
          ~/blender/blender --version

      - name: Set Blender Path
        run: echo "BLENDER_PATH=$HOME/blender/blender" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libxi6 \
            libxxf86vm1 \
            libxfixes3 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libxkbcommon0 \
            libsm6 \
            libice6 \
            libxrandr2 \
            libxcursor1 \
            libxinerama1 \
            libgl1 \
            libgl1-mesa-dri \
            libglx-mesa0 \
            libegl1 \
            libegl-mesa0 \
            libglib2.0-0 \
            libgomp1 \
            mesa-utils \
            libosmesa6 \
            || true

      - name: Verify Script Exists
        run: |
          if [ -f "${{ env.SCRIPT_PATH }}" ]; then
            echo "Script found: $(wc -l < ${{ env.SCRIPT_PATH }}) lines"
          else
            echo "ERROR: ${{ env.SCRIPT_PATH }} not found"
            find . -name "*.py" | grep -v ".git"
            exit 1
          fi

      - name: Prepare Output Directory
        run: mkdir -p output

      - name: Start Xvfb
        run: |
          pkill Xvfb || true
          sleep 1
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          echo "XVFB_PID=$!" >> $GITHUB_ENV
          sleep 4
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "Xvfb started"

      - name: Test Blender Starts
        run: |
          DISPLAY=:99 \
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=4.5 \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python-expr "import bpy; print('BLENDER OK version=' + bpy.app.version_string)" \
            2>&1 | tee /tmp/blender_test.log
          cat /tmp/blender_test.log
          grep -q "BLENDER OK" /tmp/blender_test.log && echo "Blender works" || exit 1

      - name: Run Blender Pipeline
        timeout-minutes: 70
        run: |
          echo "Starting render pipeline..."
          DISPLAY=:99 \
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=4.5 \
          MESA_GLSL_VERSION_OVERRIDE=450 \
          LP_NUM_THREADS=4 \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python "${{ env.SCRIPT_PATH }}" \
            -- \
            --output-dir "${{ github.workspace }}/output" \
            2>&1 | tee /tmp/blender_output.log
          BLENDER_EXIT=${PIPESTATUS[0]}
          echo "Exit code: ${BLENDER_EXIT}"
          tail -100 /tmp/blender_output.log || true
          ls -lah "${{ github.workspace }}/output/" || true
          exit ${BLENDER_EXIT}

      - name: Stop Xvfb
        if: always()
        run: pkill Xvfb 2>/dev/null || true

      - name: Verify Output Files
        run: |
          ls -lah output/ || true
          RENDER_OK=false
          [ -f "output/cryptopunk_character_render.png" ] && RENDER_OK=true && echo "PNG: OK" || echo "PNG: MISSING"
          [ -f "output/cryptopunk_character.blend" ] && echo "BLEND: OK" || echo "BLEND: not generated"
          [ -f "output/cryptopunk_character.usdz" ] && echo "USDZ: OK" || echo "USDZ: not generated"
          [ -f "output/cryptopunk_character.glb" ] && echo "GLB: OK" || echo "GLB: not generated"
          [ "$RENDER_OK" = false ] && echo "FATAL: PNG missing" && exit 1
          echo "SUCCESS"

      - name: Upload Debug Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blender-debug-log
          path: /tmp/blender_output.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Test Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blender-test-log
          path: /tmp/blender_test.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload PNG Render
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-render-PNG
          path: output/cryptopunk_character_render.png
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Blender Scene
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-blender-scene
          path: output/cryptopunk_character.blend
          retention-days: 30
          if-no-files-found: warn

      - name: Upload USDZ iPhone AR
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-iPhone-AR-USDZ
          path: output/cryptopunk_character.usdz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload GLB Web
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-web-GLB
          path: output/cryptopunk_character.glb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload All Outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-outputs-bundle
          path: output/
          retention-days: 30
          if-no-files-found: warn

      - name: Job Summary
        if: always()
        run: |
          echo "## CryptoPunk Render Results" >> $GITHUB_STEP_SUMMARY
          echo "| File | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          for f in \
            "PNG:output/cryptopunk_character_render.png" \
            "BLEND:output/cryptopunk_character.blend" \
            "USDZ:output/cryptopunk_character.usdz" \
            "GLB:output/cryptopunk_character.glb"; do
            LABEL=$(echo "$f" | cut -d: -f1)
            FILE=$(echo "$f" | cut -d: -f2)
            [ -f "$FILE" ] && STATUS="Ready" || STATUS="Not generated"
            echo "| $LABEL | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done
