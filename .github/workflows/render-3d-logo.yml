name: 3D CryptoPunk Character Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BLENDER_VERSION: "4.1.1"
  BLENDER_MAJOR: "4.1"
  SCRIPT_PATH: "scripts/cryptopunk_3d.py"

jobs:
  render:
    name: Build and Render 3D Character
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      # ─────────────────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────
      # 2. CACHE BLENDER
      # ─────────────────────────────────────────────────────
      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ env.BLENDER_VERSION }}-ubuntu22-v5

      # ─────────────────────────────────────────────────────
      # 3. DOWNLOAD BLENDER
      # ─────────────────────────────────────────────────────
      - name: Download and Install Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Blender ${{ env.BLENDER_VERSION }}..."
          BLENDER_TAR="blender-${{ env.BLENDER_VERSION }}-linux-x64.tar.xz"
          BLENDER_URL="https://download.blender.org/release/Blender${{ env.BLENDER_MAJOR }}/${BLENDER_TAR}"
          mkdir -p ~/blender
          wget -q "${BLENDER_URL}" -O /tmp/blender.tar.xz
          tar -xf /tmp/blender.tar.xz -C ~/blender --strip-components=1
          rm /tmp/blender.tar.xz
          echo "Blender installed"

      - name: Verify Blender
        run: |
          ~/blender/blender --version
          echo "BLENDER_PATH=$HOME/blender/blender" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────────
      # 4. INSTALL DEPENDENCIES — Mesa software rendering
      # ─────────────────────────────────────────────────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            libxi6 \
            libxxf86vm1 \
            libxfixes3 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libsm6 \
            libice6 \
            libxrandr2 \
            libxcursor1 \
            libxinerama1 \
            libgl1 \
            libgl1-mesa-dri \
            libgl1-mesa-glx \
            libglx-mesa0 \
            libegl1 \
            libegl1-mesa \
            libegl-mesa0 \
            libgles2 \
            libglib2.0-0 \
            libgomp1 \
            mesa-utils \
            mesa-vulkan-drivers \
            libvulkan1 \
            libosmesa6 \
            libosmesa6-dev \
            || true

          echo "Dependencies installed"

          # Verify Mesa software renderer is available
          echo "Mesa version:"
          dpkg -l | grep -i mesa | head -10 || true

      # ─────────────────────────────────────────────────────
      # 5. VERIFY SCRIPT
      # ─────────────────────────────────────────────────────
      - name: Verify Script File
        run: |
          if [ -f "${{ env.SCRIPT_PATH }}" ]; then
            echo "Script found: ${{ env.SCRIPT_PATH }}"
            echo "Lines: $(wc -l < ${{ env.SCRIPT_PATH }})"
          else
            echo "ERROR: Script not found at ${{ env.SCRIPT_PATH }}"
            find . -name "*.py" | grep -v ".git"
            exit 1
          fi

      # ─────────────────────────────────────────────────────
      # 6. PREPARE OUTPUT
      # ─────────────────────────────────────────────────────
      - name: Prepare Output Directory
        run: mkdir -p output

      # ─────────────────────────────────────────────────────
      # 7. RUN BLENDER — with software Mesa GL
      # ─────────────────────────────────────────────────────
      - name: Run Blender Pipeline
        timeout-minutes: 70
        run: |
          echo "================================================"
          echo "  Starting Blender with Mesa software rendering"
          echo "================================================"

          # Force Mesa software renderer — critical for CI
          export LIBGL_ALWAYS_SOFTWARE=1
          export GALLIUM_DRIVER=llvmpipe
          export MESA_GL_VERSION_OVERRIDE=4.5
          export MESA_GLSL_VERSION_OVERRIDE=450
          export LP_NUM_THREADS=4

          # Start Xvfb
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          XVFB_PID=$!
          sleep 3
          export DISPLAY=:99

          echo "Xvfb PID: ${XVFB_PID}"
          echo "DISPLAY:  ${DISPLAY}"
          echo "LIBGL_ALWAYS_SOFTWARE: ${LIBGL_ALWAYS_SOFTWARE}"
          echo "GALLIUM_DRIVER: ${GALLIUM_DRIVER}"

          # Verify GL works with software renderer
          echo "Testing OpenGL with glxinfo..."
          glxinfo 2>/dev/null | head -5 || echo "glxinfo not available (non-fatal)"

          echo ""
          echo "Running Blender..."
          echo "================================================"

          DISPLAY=:99 \
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=4.5 \
          MESA_GLSL_VERSION_OVERRIDE=450 \
          LP_NUM_THREADS=4 \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python "${{ env.SCRIPT_PATH }}" \
            -- \
            --output-dir "${{ github.workspace }}/output" \
            2>&1 | tee /tmp/blender_output.log

          BLENDER_EXIT=${PIPESTATUS[0]}

          echo "================================================"
          echo "  Blender exit code: ${BLENDER_EXIT}"
          echo "================================================"

          echo ""
          echo "--- Last 100 lines of Blender log ---"
          tail -100 /tmp/blender_output.log || true

          echo ""
          echo "--- Output directory ---"
          ls -lah "${{ github.workspace }}/output/" || echo "(empty)"

          # Stop Xvfb
          kill $XVFB_PID 2>/dev/null || true

          exit ${BLENDER_EXIT}

      # ─────────────────────────────────────────────────────
      # 8. VERIFY OUTPUTS
      # ─────────────────────────────────────────────────────
      - name: Verify Output Files
        run: |
          echo "================================================"
          echo "  Output verification"
          echo "================================================"
          ls -lah output/ || true
          echo ""

          RENDER_OK=false

          if [ -f "output/cryptopunk_character_render.png" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character_render.png")
            echo "  PNG Render:    OK  ($(numfmt --to=iec-i --suffix=B $SZ))"
            RENDER_OK=true
          else
            echo "  PNG Render:    MISSING"
          fi

          if [ -f "output/cryptopunk_character.blend" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character.blend")
            echo "  Blender Scene: OK  ($(numfmt --to=iec-i --suffix=B $SZ))"
          else
            echo "  Blender Scene: not generated"
          fi

          if [ -f "output/cryptopunk_character.usdz" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character.usdz")
            echo "  USDZ iPhone:   OK  ($(numfmt --to=iec-i --suffix=B $SZ))"
          else
            echo "  USDZ iPhone:   not generated"
          fi

          if [ -f "output/cryptopunk_character.glb" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character.glb")
            echo "  GLB Web:       OK  ($(numfmt --to=iec-i --suffix=B $SZ))"
          else
            echo "  GLB Web:       not generated"
          fi

          echo "================================================"

          if [ "$RENDER_OK" = false ]; then
            echo "FATAL: PNG render was not produced"
            echo "Download blender-debug-log artifact for details"
            exit 1
          fi

          echo "SUCCESS: All required outputs present"

      # ─────────────────────────────────────────────────────
      # 9. UPLOAD ARTIFACTS
      # ─────────────────────────────────────────────────────

      - name: Upload Blender Debug Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blender-debug-log
          path: /tmp/blender_output.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload PNG Render
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-render-PNG
          path: output/cryptopunk_character_render.png
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Blender Scene
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-blender-scene
          path: output/cryptopunk_character.blend
          retention-days: 30
          if-no-files-found: warn

      - name: Upload USDZ for iPhone AR
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-iPhone-AR-USDZ
          path: output/cryptopunk_character.usdz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload GLB for Web 3D
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-web-GLB
          path: output/cryptopunk_character.glb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload All Outputs Bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-outputs-bundle
          path: output/
          retention-days: 30
          if-no-files-found: warn

      # ─────────────────────────────────────────────────────
      # 10. JOB SUMMARY
      # ─────────────────────────────────────────────────────
      - name: Job Summary
        if: always()
        run: |
          echo "## 3D CryptoPunk Character — Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Format | Status | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|--------|------|" >> $GITHUB_STEP_SUMMARY

          for entry in \
            "PNG Render:PNG:output/cryptopunk_character_render.png" \
            "Blender Scene:BLEND:output/cryptopunk_character.blend" \
            "iPhone AR:USDZ:output/cryptopunk_character.usdz" \
            "Web 3D:GLB:output/cryptopunk_character.glb"; do

            LABEL=$(echo  "$entry" | cut -d: -f1)
            FORMAT=$(echo "$entry" | cut -d: -f2)
            FILE=$(echo   "$entry" | cut -d: -f3)

            if [ -f "$FILE" ] && [ -s "$FILE" ]; then
              SZ=$(numfmt --to=iec-i --suffix=B $(stat -c%s "$FILE"))
              echo "| **${LABEL}** | ${FORMAT} | Ready | ${SZ} |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| **${LABEL}** | ${FORMAT} | Not generated | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Render Settings" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Blender | ${{ env.BLENDER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GL Mode | Mesa LLVMpipe (software) |" >> $GITHUB_STEP_SUMMARY
          echo "| Engine | Cycles CPU |" >> $GITHUB_STEP_SUMMARY
          echo "| Resolution | 2048 x 2048 |" >> $GITHUB_STEP_SUMMARY
          echo "| Samples | 256 + OIDN Denoiser |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | ubuntu-22.04 |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### iPhone AR" >> $GITHUB_STEP_SUMMARY
          echo "1. Download **character-iPhone-AR-USDZ** from Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. AirDrop or iCloud Drive to iPhone" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap .usdz in Files app → tap AR cube icon" >> $GITHUB_STEP_SUMMARY
