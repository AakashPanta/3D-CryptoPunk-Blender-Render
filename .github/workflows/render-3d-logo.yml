name: 3D CryptoPunk Character Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BLENDER_VERSION: "4.1.1"
  BLENDER_MAJOR: "4.1"
  SCRIPT_PATH: "scripts/cryptopunk_3d.py"

jobs:
  render:
    name: Build and Render 3D Character
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Blender Installation
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ env.BLENDER_VERSION }}-ubuntu22-v1

      - name: Download and Install Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Blender ${{ env.BLENDER_VERSION }}..."
          BLENDER_TAR="blender-${{ env.BLENDER_VERSION }}-linux-x64.tar.xz"
          BLENDER_URL="https://download.blender.org/release/Blender${{ env.BLENDER_MAJOR }}/${BLENDER_TAR}"
          mkdir -p ~/blender
          wget -q "${BLENDER_URL}" -O /tmp/blender.tar.xz
          echo "Extracting..."
          tar -xf /tmp/blender.tar.xz -C ~/blender --strip-components=1
          rm /tmp/blender.tar.xz
          echo "Blender installed"

      - name: Verify Blender
        run: |
          ~/blender/blender --version
          echo "BLENDER_PATH=$HOME/blender/blender" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxi6 \
            libxxf86vm1 \
            libxfixes3 \
            libxrender1 \
            libgl1-mesa-glx \
            libgl1-mesa-dri \
            libegl1-mesa \
            libgl1 \
            libglx-mesa0 \
            libegl-mesa0 \
            libegl1 \
            libgles2 \
            xvfb \
            libxkbcommon0 \
            libsm6 \
            libxrandr2 \
            libxcursor1 \
            libxinerama1 \
            || true
          echo "Dependencies installed"

      - name: Verify Script File
        run: |
          if [ -f "${{ env.SCRIPT_PATH }}" ]; then
            echo "Script found: ${{ env.SCRIPT_PATH }}"
            echo "Lines: $(wc -l < ${{ env.SCRIPT_PATH }})"
          else
            echo "ERROR: Script not found!"
            find . -name "*.py" | head -20
            exit 1
          fi

      - name: Prepare Output Directory
        run: mkdir -p output

      - name: Run Blender Pipeline
        timeout-minutes: 45
        run: |
          echo "Starting Blender headless pipeline..."
          xvfb-run -a -s "-screen 0 1920x1080x24" \
            ${{ env.BLENDER_PATH }} \
              --background \
              --factory-startup \
              --python ${{ env.SCRIPT_PATH }} \
              -- \
              --output-dir "${{ github.workspace }}/output"
          echo "Blender pipeline finished"
          echo "Output files:"
          ls -lah output/ 2>/dev/null || echo "(empty)"

      - name: Verify Output Files
        run: |
          if [ -f "output/cryptopunk_character_render.png" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character_render.png")
            echo "PNG render OK: $(numfmt --to=iec-i --suffix=B $SZ)"
          else
            echo "ERROR: PNG render not found!"
            ls -la output/ || true
            exit 1
          fi

          for f in \
            "output/cryptopunk_character.blend" \
            "output/cryptopunk_character.usdz" \
            "output/cryptopunk_character.glb"; do
            if [ -f "$f" ]; then
              SZ=$(stat -c%s "$f")
              echo "OK: $f ($(numfmt --to=iec-i --suffix=B $SZ))"
            else
              echo "WARNING: $f not generated"
            fi
          done

      - name: Upload PNG Render
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-render-PNG
          path: output/cryptopunk_character_render.png
          retention-days: 30
          if-no-files-found: error

      - name: Upload Blender Scene
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-blender-scene
          path: output/cryptopunk_character.blend
          retention-days: 30
          if-no-files-found: warn

      - name: Upload USDZ for iPhone AR
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-iPhone-AR-USDZ
          path: output/cryptopunk_character.usdz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload GLB for Web 3D
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-web-GLB
          path: output/cryptopunk_character.glb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload All Outputs Bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-outputs-bundle
          path: output/
          retention-days: 30
          if-no-files-found: warn

      - name: Job Summary
        if: always()
        run: |
          echo "## 3D CryptoPunk Character — Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Format | Status | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|--------|------|" >> $GITHUB_STEP_SUMMARY

          for entry in \
            "PNG Render:PNG:output/cryptopunk_character_render.png" \
            "Blender Scene:BLEND:output/cryptopunk_character.blend" \
            "iPhone AR:USDZ:output/cryptopunk_character.usdz" \
            "Web 3D:GLB:output/cryptopunk_character.glb"; do
            LABEL=$(echo "$entry" | cut -d: -f1)
            FORMAT=$(echo "$entry" | cut -d: -f2)
            FILE=$(echo "$entry" | cut -d: -f3)
            if [ -f "$FILE" ] && [ -s "$FILE" ]; then
              SZ=$(numfmt --to=iec-i --suffix=B $(stat -c%s "$FILE"))
              echo "| **${LABEL}** | ${FORMAT} | Ready | ${SZ} |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| **${LABEL}** | ${FORMAT} | Not generated | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Render Settings" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Blender | ${{ env.BLENDER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Engine | Cycles CPU |" >> $GITHUB_STEP_SUMMARY
          echo "| Resolution | 2048 x 2048 |" >> $GITHUB_STEP_SUMMARY
          echo "| Samples | 256 + OIDN Denoiser |" >> $GITHUB_STEP_SUMMARY
          echo "| Camera | 85mm f/1.8 Portrait |" >> $GITHUB_STEP_SUMMARY
          echo "| Post FX | Bloom + Vignette + Color Grade |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### iPhone AR Instructions" >> $GITHUB_STEP_SUMMARY
          echo "1. Download **character-iPhone-AR-USDZ** from Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. AirDrop or iCloud Drive to iPhone" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap .usdz in Files app" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap AR cube icon to place in your room" >> $GITHUB_STEP_SUMMARY
