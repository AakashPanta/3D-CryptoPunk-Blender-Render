name: 3D CryptoPunk Character Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BLENDER_VERSION: "3.6.21"
  BLENDER_MAJOR: "3.6"
  SCRIPT_PATH: "scripts/cryptopunk_3d.py"

jobs:
  render:
    name: Build and Render 3D Character
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug — Confirm Files
        run: |
          echo "=== Git log ==="
          git log --oneline -5
          echo ""
          echo "=== Script first 10 lines ==="
          head -10 "${{ env.SCRIPT_PATH }}" || echo "SCRIPT NOT FOUND"
          echo ""
          echo "=== Workflow file keys ==="
          cat .github/workflows/*.yml | grep -E "cache|key|BLENDER|SCRIPT" || true

      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-3.6.21-ubuntu22-v10

      - name: Download Blender 3.6 LTS
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Blender 3.6.21..."
          wget -q \
            "https://download.blender.org/release/Blender3.6/blender-3.6.21-linux-x64.tar.xz" \
            -O /tmp/blender.tar.xz
          mkdir -p ~/blender
          tar -xf /tmp/blender.tar.xz -C ~/blender --strip-components=1
          rm /tmp/blender.tar.xz
          echo "Blender installed"

      - name: Set Blender Path
        run: |
          ~/blender/blender --version
          echo "BLENDER_PATH=$HOME/blender/blender" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libxi6 \
            libxxf86vm1 \
            libxfixes3 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libsm6 \
            libice6 \
            libxrandr2 \
            libxcursor1 \
            libxinerama1 \
            libgl1 \
            libgl1-mesa-dri \
            libglx-mesa0 \
            libegl1 \
            libegl-mesa0 \
            libglib2.0-0 \
            libgomp1 \
            libosmesa6 \
            mesa-utils \
            libglu1-mesa \
            || true

      - name: Show GL Libraries
        run: |
          echo "=== GL Libraries ==="
          ldconfig -p | grep -E "libGL|libEGL|libOSMesa" || true
          echo ""
          echo "=== Mesa version ==="
          glxinfo 2>/dev/null | head -5 || echo "glxinfo not available"
          echo ""
          echo "=== osmesa check ==="
          ls -la /usr/lib/x86_64-linux-gnu/libOSMesa* 2>/dev/null || echo "OSMesa not found at default path"
          find /usr -name "libOSMesa*" 2>/dev/null || echo "OSMesa not found anywhere"

      - name: Verify Script
        run: |
          if [ -f "${{ env.SCRIPT_PATH }}" ]; then
            echo "Script OK — $(wc -l < ${{ env.SCRIPT_PATH }}) lines"
          else
            echo "ERROR: Script not found"
            find . -name "*.py" | grep -v ".git"
            exit 1
          fi

      - name: Prepare Output Directory
        run: mkdir -p output

      - name: Test Blender — Attempt 1 (llvmpipe)
        id: test1
        run: |
          echo "=== Test 1: llvmpipe software renderer ==="
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=3.3 \
          MESA_GLSL_VERSION_OVERRIDE=330 \
          LIBGL_DEBUG=verbose \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python-expr "import bpy; print('BLENDER_OK=' + bpy.app.version_string)" \
            2>&1 | tee /tmp/blender_test.log || true
          echo "--- log ---"
          cat /tmp/blender_test.log
          if grep -q "BLENDER_OK" /tmp/blender_test.log; then
            echo "TEST1_PASSED=true" >> $GITHUB_ENV
            echo "PASSED"
          else
            echo "TEST1_PASSED=false" >> $GITHUB_ENV
            echo "FAILED — trying next method"
          fi

      - name: Test Blender — Attempt 2 (softpipe fallback)
        if: env.TEST1_PASSED == 'false'
        run: |
          echo "=== Test 2: softpipe fallback ==="
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=softpipe \
          MESA_GL_VERSION_OVERRIDE=3.3 \
          LIBGL_DEBUG=verbose \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python-expr "import bpy; print('BLENDER_OK=' + bpy.app.version_string)" \
            2>&1 | tee /tmp/blender_test2.log || true
          echo "--- log ---"
          cat /tmp/blender_test2.log
          if grep -q "BLENDER_OK" /tmp/blender_test2.log; then
            echo "TEST2_PASSED=true" >> $GITHUB_ENV
            cp /tmp/blender_test2.log /tmp/blender_test.log
            echo "PASSED"
          else
            echo "TEST2_PASSED=false" >> $GITHUB_ENV
            echo "FAILED"
          fi

      - name: Test Blender — Attempt 3 (Xvfb + llvmpipe)
        if: env.TEST1_PASSED == 'false' && env.TEST2_PASSED == 'false'
        run: |
          echo "=== Test 3: Xvfb + llvmpipe ==="
          pkill Xvfb || true
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 4
          DISPLAY=:99 \
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=3.3 \
          LIBGL_DEBUG=verbose \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python-expr "import bpy; print('BLENDER_OK=' + bpy.app.version_string)" \
            2>&1 | tee /tmp/blender_test3.log || true
          pkill Xvfb || true
          echo "--- log ---"
          cat /tmp/blender_test3.log
          if grep -q "BLENDER_OK" /tmp/blender_test3.log; then
            echo "TEST3_PASSED=true" >> $GITHUB_ENV
            cp /tmp/blender_test3.log /tmp/blender_test.log
            echo "PASSED"
          else
            echo "TEST3_PASSED=false" >> $GITHUB_ENV
            echo "FAILED — see log above for actual error"
          fi

      - name: Run Blender Pipeline
        timeout-minutes: 70
        run: |
          echo "Starting render pipeline..."
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=3.3 \
          MESA_GLSL_VERSION_OVERRIDE=330 \
          LP_NUM_THREADS=4 \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python "${{ env.SCRIPT_PATH }}" \
            -- \
            --output-dir "${{ github.workspace }}/output" \
            2>&1 | tee /tmp/blender_output.log

          BLENDER_EXIT=${PIPESTATUS[0]}
          echo "Exit code: ${BLENDER_EXIT}"
          echo ""
          echo "=== Last 150 lines ==="
          tail -150 /tmp/blender_output.log || true
          echo ""
          echo "=== Output files ==="
          ls -lah "${{ github.workspace }}/output/" || true
          exit ${BLENDER_EXIT}

      - name: Verify Output Files
        run: |
          ls -lah output/ || true
          RENDER_OK=false
          [ -f "output/cryptopunk_character_render.png" ] \
            && RENDER_OK=true && echo "PNG:   OK" \
            || echo "PNG:   MISSING"
          [ -f "output/cryptopunk_character.blend" ] \
            && echo "BLEND: OK" || echo "BLEND: not generated"
          [ -f "output/cryptopunk_character.usdz" ] \
            && echo "USDZ:  OK" || echo "USDZ:  not generated"
          [ -f "output/cryptopunk_character.glb" ] \
            && echo "GLB:   OK" || echo "GLB:   not generated"
          [ "$RENDER_OK" = false ] \
            && echo "FATAL: PNG missing" && exit 1
          echo "SUCCESS"

      - name: Upload Debug Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blender-debug-log
          path: /tmp/blender_output.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Test Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blender-test-log
          path: /tmp/blender_test.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload PNG Render
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-render-PNG
          path: output/cryptopunk_character_render.png
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Blender Scene
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-blender-scene
          path: output/cryptopunk_character.blend
          retention-days: 30
          if-no-files-found: warn

      - name: Upload USDZ iPhone AR
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-iPhone-AR-USDZ
          path: output/cryptopunk_character.usdz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload GLB Web
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-web-GLB
          path: output/cryptopunk_character.glb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload All Outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-outputs-bundle
          path: output/
          retention-days: 30
          if-no-files-found: warn

      - name: Job Summary
        if: always()
        run: |
          echo "## CryptoPunk Render Results" >> $GITHUB_STEP_SUMMARY
          echo "| File | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          for f in \
            "PNG:output/cryptopunk_character_render.png" \
            "BLEND:output/cryptopunk_character.blend" \
            "USDZ:output/cryptopunk_character.usdz" \
            "GLB:output/cryptopunk_character.glb"; do
            LABEL=$(echo "$f" | cut -d: -f1)
            FILE=$(echo "$f" | cut -d: -f2)
            [ -f "$FILE" ] && STATUS="✅ Ready" || STATUS="❌ Not generated"
            echo "| $LABEL | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done
