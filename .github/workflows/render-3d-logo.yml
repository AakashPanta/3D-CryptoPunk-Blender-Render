name: 3D CryptoPunk Blender Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BLENDER_VERSION: "4.1.1"
  BLENDER_MAJOR: "4.1"

jobs:
  render:
    name: Build and Render 3D Scene
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ env.BLENDER_VERSION }}-linux-x64-v2

      - name: Download and Install Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          echo "========================================="
          echo "  Downloading Blender ${{ env.BLENDER_VERSION }}"
          echo "========================================="
          BLENDER_TAR="blender-${{ env.BLENDER_VERSION }}-linux-x64.tar.xz"
          BLENDER_URL="https://download.blender.org/release/Blender${{ env.BLENDER_MAJOR }}/${BLENDER_TAR}"
          mkdir -p ~/blender
          wget -q "${BLENDER_URL}" -O /tmp/blender.tar.xz
          echo "Extracting..."
          tar -xf /tmp/blender.tar.xz -C ~/blender --strip-components=1
          rm /tmp/blender.tar.xz
          echo "Blender installed"

      - name: Verify Blender
        run: |
          export PATH="$HOME/blender:$PATH"
          blender --version
          echo "BLENDER_PATH=$HOME/blender/blender" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          echo "Installing dependencies..."
          sudo apt-get update -y
          sudo apt-get install -y \
            libxi6 \
            libxxf86vm1 \
            libxfixes3 \
            libxrender1 \
            libgl1-mesa-glx \
            libgl1-mesa-dri \
            libegl1-mesa \
            libgl1 \
            libglx-mesa0 \
            libegl-mesa0 \
            libegl1 \
            libgles2 \
            xvfb \
            libxkbcommon0 \
            libsm6 \
            libxrandr2 \
            libxcursor1 \
            libxinerama1 \
            || true
          echo "Dependencies installed"

      - name: Prepare Output Directory
        run: mkdir -p output

      - name: Render 3D Scene
        timeout-minutes: 30
        run: |
          echo "========================================="
          echo "  Starting Blender Headless Render"
          echo "========================================="
          xvfb-run -a -s "-screen 0 1920x1080x24" \
            ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python scripts/cryptopunk_3d.py \
            -- \
            --output-dir "${{ github.workspace }}/output"
          echo "========================================="
          echo "  Render step finished"
          echo "========================================="
          echo "Output files:"
          ls -lah output/

      - name: Verify Render Output
        run: |
          if [ -f "output/cryptopunk_3d_render.png" ]; then
            FILE_SIZE=$(stat -c%s "output/cryptopunk_3d_render.png")
            echo "Render found! Size: $(numfmt --to=iec-i --suffix=B $FILE_SIZE)"
          else
            echo "ERROR: Render file not found!"
            echo "Contents of output/:"
            ls -la output/ || echo "  (directory empty or missing)"
            exit 1
          fi

      - name: Upload Rendered Image
        uses: actions/upload-artifact@v4
        with:
          name: cryptopunk-3d-render
          path: output/cryptopunk_3d_render.png
          retention-days: 30
          if-no-files-found: error

      - name: Upload Blender Scene File
        uses: actions/upload-artifact@v4
        with:
          name: cryptopunk-3d-blend-file
          path: output/cryptopunk_scene.blend
          retention-days: 30
          if-no-files-found: warn

      - name: Job Summary
        if: always()
        run: |
          echo "## 3D CryptoPunk Render Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "output/cryptopunk_3d_render.png" ]; then
            FILE_SIZE=$(stat -c%s "output/cryptopunk_3d_render.png")
            READABLE_SIZE=$(numfmt --to=iec-i --suffix=B $FILE_SIZE)
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | Success |" >> $GITHUB_STEP_SUMMARY
            echo "| **Blender** | ${{ env.BLENDER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Engine** | Cycles (CPU) |" >> $GITHUB_STEP_SUMMARY
            echo "| **Resolution** | 2048 x 2048 |" >> $GITHUB_STEP_SUMMARY
            echo "| **File Size** | ${READABLE_SIZE} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Samples** | 128 + Denoiser |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download from **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Status** | Failed |" >> $GITHUB_STEP_SUMMARY
          fi
