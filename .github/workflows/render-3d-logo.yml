name: 3D CryptoPunk Character Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BLENDER_VERSION: "4.1.1"
  BLENDER_MAJOR: "4.1"
  SCRIPT_PATH: "scripts/cryptopunk_3d.py"

jobs:
  render:
    name: Build and Render 3D Character
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ env.BLENDER_VERSION }}-ubuntu22-v6

      - name: Download and Install Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Blender ${{ env.BLENDER_VERSION }}..."
          BLENDER_TAR="blender-${{ env.BLENDER_VERSION }}-linux-x64.tar.xz"
          BLENDER_URL="https://download.blender.org/release/Blender${{ env.BLENDER_MAJOR }}/${BLENDER_TAR}"
          mkdir -p ~/blender
          wget -q "${BLENDER_URL}" -O /tmp/blender.tar.xz
          tar -xf /tmp/blender.tar.xz -C ~/blender --strip-components=1
          rm /tmp/blender.tar.xz
          echo "Blender installed"
          ~/blender/blender --version

      - name: Verify Blender
        run: |
          ~/blender/blender --version
          echo "BLENDER_PATH=$HOME/blender/blender" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            libxi6 \
            libxxf86vm1 \
            libxfixes3 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libsm6 \
            libice6 \
            libxrandr2 \
            libxcursor1 \
            libxinerama1 \
            libgl1 \
            libgl1-mesa-dri \
            libgl1-mesa-glx \
            libglx-mesa0 \
            libegl1 \
            libegl1-mesa \
            libegl-mesa0 \
            libgles2 \
            libglib2.0-0 \
            libgomp1 \
            mesa-utils \
            libosmesa6 \
            libvulkan1 \
            mesa-vulkan-drivers \
            || true
          echo "Done"

      - name: Verify Script File
        run: |
          echo "Checking: ${{ env.SCRIPT_PATH }}"
          if [ -f "${{ env.SCRIPT_PATH }}" ]; then
            echo "Found — $(wc -l < ${{ env.SCRIPT_PATH }}) lines"
          else
            echo "ERROR: not found"
            find . -name "*.py" | grep -v ".git"
            exit 1
          fi

      - name: Prepare Output Directory
        run: mkdir -p output

      # ─────────────────────────────────────────────────────
      # START XVFB — shared across all Blender steps
      # ─────────────────────────────────────────────────────
      - name: Start Xvfb Display
        run: |
          pkill Xvfb || true
          sleep 1
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          echo "XVFB_PID=$!" >> $GITHUB_ENV
          sleep 4
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "Xvfb started on :99"

      # ─────────────────────────────────────────────────────
      # QUICK PYTHON TEST — catches script errors immediately
      # ─────────────────────────────────────────────────────
      - name: Test Blender Python
        run: |
          echo "Running Blender Python sanity check..."

          DISPLAY=:99 \
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=4.5 \
          MESA_GLSL_VERSION_OVERRIDE=450 \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python-expr "
import sys, bpy
print('=== BLENDER PYTHON TEST ===')
print('Python:', sys.version.split()[0])
print('Blender:', bpy.app.version_string)
print('Platform:', sys.platform)
print('=== TEST PASSED ===')
" 2>&1 | tee /tmp/blender_test.log

          echo "--- Test log ---"
          cat /tmp/blender_test.log

          if grep -q "TEST PASSED" /tmp/blender_test.log; then
            echo "Blender Python is working correctly"
          else
            echo "ERROR: Blender Python test failed"
            exit 1
          fi

      # ─────────────────────────────────────────────────────
      # VALIDATE SCRIPT — dry run syntax check
      # ─────────────────────────────────────────────────────
      - name: Validate Python Script Syntax
        run: |
          echo "Checking script syntax..."

          DISPLAY=:99 \
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=4.5 \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python-expr "
import ast, sys
script = open('${{ env.SCRIPT_PATH }}').read()
try:
    ast.parse(script)
    print('SYNTAX OK: ${{ env.SCRIPT_PATH }}')
except SyntaxError as e:
    print(f'SYNTAX ERROR: {e}')
    sys.exit(1)
" 2>&1 | tee /tmp/syntax_check.log

          cat /tmp/syntax_check.log

          if grep -q "SYNTAX OK" /tmp/syntax_check.log; then
            echo "Script syntax is valid"
          else
            echo "Script has syntax errors — fix before rendering"
            exit 1
          fi

      # ─────────────────────────────────────────────────────
      # MAIN RENDER
      # ─────────────────────────────────────────────────────
      - name: Run Blender Pipeline
        timeout-minutes: 70
        run: |
          echo "================================================"
          echo "  Running full Blender render pipeline"
          echo "================================================"

          DISPLAY=:99 \
          LIBGL_ALWAYS_SOFTWARE=1 \
          GALLIUM_DRIVER=llvmpipe \
          MESA_GL_VERSION_OVERRIDE=4.5 \
          MESA_GLSL_VERSION_OVERRIDE=450 \
          LP_NUM_THREADS=4 \
          ${{ env.BLENDER_PATH }} \
            --background \
            --factory-startup \
            --python-exit-code 1 \
            --python "${{ env.SCRIPT_PATH }}" \
            -- \
            --output-dir "${{ github.workspace }}/output" \
            2>&1 | tee /tmp/blender_output.log

          BLENDER_EXIT=${PIPESTATUS[0]}

          echo ""
          echo "================================================"
          echo "  Blender exit code: ${BLENDER_EXIT}"
          echo "================================================"
          echo ""
          echo "--- Last 100 lines ---"
          tail -100 /tmp/blender_output.log || true
          echo ""
          echo "--- Output directory ---"
          ls -lah "${{ github.workspace }}/output/" || echo "(empty)"

          exit ${BLENDER_EXIT}

      # ─────────────────────────────────────────────────────
      # STOP XVFB
      # ─────────────────────────────────────────────────────
      - name: Stop Xvfb
        if: always()
        run: |
          kill ${{ env.XVFB_PID }} 2>/dev/null || true
          pkill Xvfb 2>/dev/null || true
          echo "Xvfb stopped"

      # ─────────────────────────────────────────────────────
      # VERIFY OUTPUTS
      # ─────────────────────────────────────────────────────
      - name: Verify Output Files
        run: |
          echo "================================================"
          echo "  Output verification"
          echo "================================================"
          ls -lah output/ || true
          echo ""

          RENDER_OK=false

          if [ -f "output/cryptopunk_character_render.png" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character_render.png")
            echo "  PNG Render:    OK  ($(numfmt --to=iec-i --suffix=B $SZ))"
            RENDER_OK=true
          else
            echo "  PNG Render:    MISSING"
          fi

          if [ -f "output/cryptopunk_character.blend" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character.blend")
            echo "  Blender Scene: OK  ($(numfmt --to=iec-i --suffix=B $SZ))"
          else
            echo "  Blender Scene: not generated"
          fi

          if [ -f "output/cryptopunk_character.usdz" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character.usdz")
            echo "  USDZ iPhone:   OK  ($(numfmt --to=iec-i --suffix=B $SZ))"
          else
            echo "  USDZ iPhone:   not generated"
          fi

          if [ -f "output/cryptopunk_character.glb" ]; then
            SZ=$(stat -c%s "output/cryptopunk_character.glb")
            echo "  GLB Web:       OK  ($(numfmt --to=iec-i --suffix=B $SZ))"
          else
            echo "  GLB Web:       not generated"
          fi

          echo "================================================"

          if [ "$RENDER_OK" = false ]; then
            echo "FATAL: PNG render not produced"
            echo "Download blender-debug-log artifact for full details"
            exit 1
          fi

          echo "SUCCESS"

      # ─────────────────────────────────────────────────────
      # UPLOAD ARTIFACTS
      # ─────────────────────────────────────────────────────

      - name: Upload Blender Debug Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blender-debug-log
          path: /tmp/blender_output.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Blender Test Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blender-test-log
          path: /tmp/blender_test.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload PNG Render
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-render-PNG
          path: output/cryptopunk_character_render.png
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Blender Scene
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-blender-scene
          path: output/cryptopunk_character.blend
          retention-days: 30
          if-no-files-found: warn

      - name: Upload USDZ for iPhone AR
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-iPhone-AR-USDZ
          path: output/cryptopunk_character.usdz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload GLB for Web 3D
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: character-web-GLB
          path: output/cryptopunk_character.glb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload All Outputs Bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-outputs-bundle
          path: output/
          retention-days: 30
          if-no-files-found: warn

      # ─────────────────────────────────────────────────────
      # JOB SUMMARY
      # ─────────────────────────────────────────────────────
      - name: Job Summary
        if: always()
        run: |
          echo "## 3D CryptoPunk — Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Status | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|------|" >> $GITHUB_STEP_SUMMARY

          for entry in \
            "PNG Render:output/cryptopunk_character_render.png" \
            "Blender Scene:output/cryptopunk_character.blend" \
            "iPhone AR USDZ:output/cryptopunk_character.usdz" \
            "Web GLB:output/cryptopunk_character.glb"; do

            LABEL=$(echo "$entry" | cut -d: -f1)
            FILE=$(echo  "$entry" | cut -d: -f2)

            if [ -f "$FILE" ] && [ -s "$FILE" ]; then
              SZ=$(numfmt --to=iec-i --suffix=B $(stat -c%s "$FILE"))
              echo "| **${LABEL}** | Ready | ${SZ} |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| **${LABEL}** | Not generated | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Blender | ${{ env.BLENDER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GL | Mesa LLVMpipe (software) |" >> $GITHUB_STEP_SUMMARY
          echo "| Engine | Cycles CPU |" >> $GITHUB_STEP_SUMMARY
          echo "| Resolution | 2048 x 2048 |" >> $GITHUB_STEP_SUMMARY
          echo "| Samples | 256 + OIDN |" >> $GITHUB_STEP_SUMMARY
